              $ref: "#/components/schemas/SemanticSearchRequest"
      responses:
        "200":
          description: Semantic search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SemanticSearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WeekStartPath:
      name: weekStart
      in: path
      required: true
      description: ISO date of the Monday that starts the week (e.g., 2026-03-09)
      schema:
        type: string
        format: date
    PlanIdPath:
      name: planId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CommitIdPath:
      name: commitId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        format: uuid
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: Optimistic lock version number
      schema:
        type: integer
    OutcomeIdPath:
      name: outcomeId
      in: path
      required: true
      description: UUID of the RCDO outcome
      schema:
        type: string
        format: uuid
  schemas:
    # ── Phase 6 Enums ───────────────────────────────────────────
    EffortType:
      type: string
      enum:
        - BUILD
        - MAINTAIN
        - COLLABORATE
        - LEARN
      description: Classifies the type of effort an issue represents
    IssueStatus:
      type: string
      enum:
        - OPEN
        - IN_PROGRESS
        - DONE
        - ARCHIVED
      description: Lifecycle status for a backlog issue
    TeamRole:
      type: string
      enum:
        - OWNER
        - MEMBER
      description: Role of a user within a team
    AccessRequestStatus:
      type: string
      enum:
        - PENDING
        - APPROVED
        - DENIED
      description: Status of a team access request
    IssueActivityType:
      type: string
      enum:
        - CREATED
        - STATUS_CHANGE
        - ASSIGNMENT_CHANGE
        - PRIORITY_CHANGE
        - EFFORT_TYPE_CHANGE
        - ESTIMATE_CHANGE
        - COMMENT
        - TIME_ENTRY
        - OUTCOME_CHANGE
        - COMMITTED_TO_WEEK
        - RELEASED_TO_BACKLOG
        - CARRIED_FORWARD
        - BLOCKED
        - UNBLOCKED
        - DESCRIPTION_CHANGE
        - TITLE_CHANGE
      description: Audit activity type recorded on an issue

    # ── Phase 6 Entity Schemas ───────────────────────────────────
    Issue:
      type: object
      required:
        - id
        - orgId
        - teamId
        - issueKey
        - sequenceNumber
        - title
        - creatorUserId
        - status
        - version
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        issueKey:
          type: string
          description: Human-readable key, e.g. "ENG-42"
        sequenceNumber:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        effortType:
          $ref: "#/components/schemas/EffortType"
          nullable: true
        estimatedHours:
          type: number
          format: double
          nullable: true
        chessPriority:
          $ref: "#/components/schemas/ChessPriority"
          nullable: true
        outcomeId:
          type: string
          format: uuid
          nullable: true
        nonStrategicReason:
          type: string
          nullable: true
        creatorUserId:
          type: string
          format: uuid
        assigneeUserId:
          type: string
          format: uuid
          nullable: true
        blockedByIssueId:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: "#/components/schemas/IssueStatus"
        aiRecommendedRank:
          type: number
          format: double
          nullable: true
        aiRankRationale:
          type: string
          nullable: true
        aiSuggestedEffortType:
          $ref: "#/components/schemas/EffortType"
          nullable: true
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true

    WeeklyAssignment:
      type: object
      required:
        - id
        - orgId
        - weeklyPlanId
        - issueId
        - tags
        - version
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        weeklyPlanId:
          type: string
          format: uuid
        issueId:
          type: string
          format: uuid
        chessPriorityOverride:
          $ref: "#/components/schemas/ChessPriority"
          nullable: true
        expectedResult:
          type: string
          nullable: true
        confidence:
          type: number
          format: double
          nullable: true
        snapshotRallyCryId:
          type: string
          format: uuid
          nullable: true
        snapshotRallyCryName:
          type: string
          nullable: true
        snapshotObjectiveId:
          type: string
          format: uuid
          nullable: true
        snapshotObjectiveName:
          type: string
          nullable: true
        snapshotOutcomeId:
          type: string
          format: uuid
          nullable: true
        snapshotOutcomeName:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WeeklyAssignmentActual:
      type: object
      required:
        - assignmentId
        - orgId
        - completionStatus
        - createdAt
        - updatedAt
      properties:
        assignmentId:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        actualResult:
          type: string
          nullable: true
        completionStatus:
          $ref: "#/components/schemas/CompletionStatus"
        deltaReason:
          type: string
          nullable: true
        hoursSpent:
          type: number
          format: double
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    IssueActivity:
      type: object
      required:
        - id
        - orgId
        - issueId
        - actorUserId
        - activityType
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        issueId:
          type: string
          format: uuid
        actorUserId:
          type: string
          format: uuid
        activityType:
          $ref: "#/components/schemas/IssueActivityType"
        oldValue:
          type: string
          nullable: true
        newValue:
          type: string
          nullable: true
        commentText:
          type: string
          nullable: true
        hoursLogged:
          type: number
          format: double
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        createdAt:
          type: string
          format: date-time

    Team:
      type: object
      required:
        - id
        - orgId
        - name
        - keyPrefix
        - ownerUserId
        - issueSequence
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        name:
          type: string
        keyPrefix:
          type: string
          description: Short prefix used in issue keys, e.g. "ENG"
        description:
          type: string
          nullable: true
        ownerUserId:
          type: string
          format: uuid
        issueSequence:
          type: integer
          description: Current issue sequence counter
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TeamMember:
      type: object
      required:
        - teamId
        - userId
        - orgId
        - role
        - joinedAt
      properties:
        teamId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/TeamRole"
        joinedAt:
          type: string
          format: date-time

    TeamAccessRequest:
      type: object
      required:
        - id
        - teamId
        - requesterUserId
        - orgId
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        requesterUserId:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/AccessRequestStatus"
        decidedByUserId:
          type: string
          format: uuid
          nullable: true
        decidedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ── Phase 6 Request/Response Schemas ─────────────────────────
    CreateTeamRequest:
      type: object
      required:
        - name
        - keyPrefix
      properties:
        name:
          type: string
        keyPrefix:
          type: string
        description:
          type: string
          nullable: true

    UpdateTeamRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true

    AddTeamMemberRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/TeamRole"

    TeamListResponse:
      type: object
      required:
        - teams
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/Team"

    TeamDetailResponse:
      type: object
      required:
        - team
        - members
      properties:
        team:
          $ref: "#/components/schemas/Team"
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"

    TeamAccessRequestAction:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/AccessRequestStatus"

    TeamAccessRequestListResponse:
      type: object
      required:
        - requests
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/TeamAccessRequest"

    CreateIssueRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        effortType:
          $ref: "#/components/schemas/EffortType"
          nullable: true
        estimatedHours:
          type: number
          format: double
          nullable: true
        chessPriority:
          $ref: "#/components/schemas/ChessPriority"
          nullable: true
        outcomeId:
          type: string
          format: uuid
          nullable: true
        nonStrategicReason:
          type: string
          nullable: true
        assigneeUserId:
          type: string
          format: uuid
          nullable: true
        blockedByIssueId:
          type: string
          format: uuid
          nullable: true

    UpdateIssueRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        effortType:
          $ref: "#/components/schemas/EffortType"
          nullable: true
        estimatedHours:
          type: number
          format: double
          nullable: true
        chessPriority:
          $ref: "#/components/schemas/ChessPriority"
          nullable: true
        outcomeId:
          type: string
          format: uuid
          nullable: true
        nonStrategicReason:
          type: string
          nullable: true
        assigneeUserId:
          type: string
          format: uuid
          nullable: true
        blockedByIssueId:
          type: string
          format: uuid
          nullable: true
