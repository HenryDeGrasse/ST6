          type: number
          format: double
          nullable: true
          description: thisWeekActual / thisWeekEstimated ratio; null when
            thisWeekEstimated is zero
        overallBias:
          type: number
          format: double
          nullable: true
          description: Historical avgActual / avgEstimated from capacity profile; null if
            no profile
        confidenceLevel:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
          description: Profile data quality tier
        categoryInsights:
          type: array
          items:
            $ref: "#/components/schemas/CategoryInsight"
          description: Per-category bias breakdown with optional coaching tips
        priorityInsights:
          type: array
          items:
            $ref: "#/components/schemas/PriorityInsight"
          description: Per-priority completion-rate statistics
    CategoryInsight:
      type: object
      required:
        - category
      description: Per-category estimation insight.
      properties:
        category:
          type: string
          description: Commit category name (e.g. DELIVERY)
        bias:
          type: number
          format: double
          nullable: true
          description: Historical actual/estimated ratio for this category
        tip:
          type: string
          nullable: true
          description: Human-readable coaching tip when bias deviates from 1.0 by ≥15%
    PriorityInsight:
      type: object
      required:
        - priority
        - completionRate
        - sampleSize
      description: Per-priority completion insight.
      properties:
        priority:
          type: string
          description: Chess priority name (e.g. KING)
        completionRate:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Fraction of commits with status DONE
        sampleSize:
          type: integer
          description: Number of historical commits in this priority tier
    ApiError:
      type: object
      required:
        - code
        - message
        - details
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
    QuickUpdateRequest:
      type: object
      required:
        - updates
      description: Batch check-in request containing zero or more per-commit items.
      properties:
        updates:
          type: array
          description: List of per-commit check-in items
          items:
            $ref: "#/components/schemas/QuickUpdateItem"
    QuickUpdateItem:
      type: object
      required:
        - commitId
        - status
      description: A single per-commit check-in entry within a quick-update batch.
      properties:
        commitId:
          type: string
          format: uuid
          description: UUID of the weekly commit to check in against
        status:
          type: string
          enum:
            - ON_TRACK
            - AT_RISK
            - BLOCKED
            - DONE_EARLY
          description: Current progress status for the commit
        note:
          type: string
          nullable: true
          description: Optional free-text note accompanying this check-in
        noteSource:
          type: string
          nullable: true
          enum:
            - UNKNOWN
            - USER_TYPED
            - SUGGESTION_ACCEPTED
          description: Optional provenance for the submitted note text
        selectedSuggestionText:
          type: string
          nullable: true
          description: Suggestion text the user accepted, when applicable
        selectedSuggestionSource:
          type: string
          nullable: true
          description: Origin of the accepted suggestion, when applicable
    QuickUpdateResponse:
      type: object
      required:
        - updatedCount
        - entries
      description: Result of a batch quick-update operation.
      properties:
        updatedCount:
          type: integer
          minimum: 0
          description: Total number of progress entries created by this request
        entries:
          type: array
          description: The newly created progress entries, in processing order
          items:
            $ref: "#/components/schemas/CheckInEntry"
    CheckInOptionRequest:
      type: object
      required:
        - commitId
      description: Context for generating AI check-in note options for a single commit.
      properties:
        commitId:
          type: string
          format: uuid
          description: UUID of the weekly commit to generate options for
        currentStatus:
          type: string
          nullable: true
          description: Current progress status selection, if any
        lastNote:
          type: string
          nullable: true
          description: Most recent check-in note for this commit, if any
        daysSinceLastCheckIn:
          type: integer
          minimum: 0
          description: Number of days elapsed since the commit's most recent check-in
    CheckInOptionsResponse:
      type: object
      required:
        - status
        - statusOptions
        - progressOptions
      description: |
        Generated check-in option payload.

        `status` is currently always `"ok"`.
      properties:
        status:
          type: string
          enum:
            - ok
          description: Service status
        statusOptions:
          type: array
          description: Ordered list of valid progress status strings for the UI picker
          items:
            type: string
            enum:
              - ON_TRACK
              - AT_RISK
              - BLOCKED
              - DONE_EARLY
        progressOptions:
          type: array
          description: AI- and pattern-derived note suggestions (may be empty on fallback)
          items:
            $ref: "#/components/schemas/CheckInOptionItem"
    CheckInOptionItem:
      type: object
      required:
        - text
        - source
      description: A single note suggestion within a CheckInOptionsResponse.
      properties:
        text:
          type: string
          maxLength: 50
          description: Short phrase presented to the user in the Quick Update card
        source:
          type: string
          enum:
            - user_history
            - team_common
            - ai_generated
          description: Deterministic suggestion origin assigned by the server
    UserProfileResponse:
      type: object
      required:
        - userId
        - weeksAnalyzed
        - performanceProfile
        - preferences
        - trends
      description: |
        Computed user model snapshot derived from a rolling window of reconciled
        weekly plans.

        When no snapshot exists yet, the nested profile sections are null and
        `weeksAnalyzed` is 0.
      properties:
        userId:
          type: string
          format: uuid
          description: UUID of the user this profile belongs to
        weeksAnalyzed:
          type: integer
          minimum: 0
          description: Number of reconciled plan weeks used to derive this profile
        performanceProfile:
          allOf:
            - $ref: "#/components/schemas/PerformanceProfile"
          nullable: true
        preferences:
          allOf:
            - $ref: "#/components/schemas/UserPreferences"
          nullable: true
        trends:
          allOf:
            - $ref: "#/components/schemas/UserTrends"
          nullable: true
    PerformanceProfile:
      type: object
      required:
        - estimationAccuracy
        - completionReliability
        - avgCommitsPerWeek
        - avgCarryForwardPerWeek
        - topCategories
        - categoryCompletionRates
        - priorityCompletionRates
      description: Aggregated performance metrics computed from the user's reconciled
        plan history.
      properties:
        estimationAccuracy:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Confidence accuracy ratio against final completion outcome
        completionReliability:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Fraction of reconciled commits marked DONE across the analysis window
        avgCommitsPerWeek:
          type: number
          format: double
          minimum: 0
          description: Average number of commits created per analyzed week
        avgCarryForwardPerWeek:
          type: number
          format: double
          minimum: 0
          description: Average number of commits carried forward per analyzed week
        topCategories:
          type: array
          maxItems: 3
          description: Top commit categories by DONE completion rate, ordered descending
          items:
            type: string
            description: CommitCategory name (for example DELIVERY or OPERATIONS)
        categoryCompletionRates:
          type: object
          description: DONE completion rate per CommitCategory
          additionalProperties:
            type: number
            format: double
        priorityCompletionRates:
          type: object
          description: DONE completion rate per ChessPriority
          additionalProperties:
            type: number
            format: double
    UserPreferences:
      type: object
      required:
        - typicalPriorityPattern
        - recurringCommitTitles
        - avgCheckInsPerWeek
        - preferredUpdateDays
      description: Behavioural preference signals derived from the user's planning history.
      properties:
        typicalPriorityPattern:
          type: string
          description: Average weekly chess-priority mix, for example `1K-2Q-3R`
        recurringCommitTitles:
          type: array
          description: Commonly repeated commit titles from recent history
          items:
            type: string
        avgCheckInsPerWeek:
          type: number
          format: double
          minimum: 0
          description: Average number of progress entries recorded per analyzed week
        preferredUpdateDays:
          type: array
          description: Day-of-week names ordered by frequency descending
          items:
            type: string
            description: ISO day-of-week name, for example MONDAY
    UserTrends:
      type: object
      required:
        - strategicAlignmentTrend
        - completionTrend
        - carryForwardTrend
      description: Directional trend signals comparing recent performance with earlier
        history.
      properties:
        strategicAlignmentTrend:
          type: string
          enum:
            - IMPROVING
            - STABLE
            - WORSENING
          description: Trend in the fraction of commits linked to RCDO outcomes
        completionTrend:
          type: string
          enum:
            - IMPROVING
            - STABLE
            - WORSENING
          description: Trend in commit completion reliability
        carryForwardTrend:
          type: string
          enum:
            - IMPROVING
            - STABLE
            - WORSENING
          description: Trend in carry-forward velocity
    OutcomeCoverageTimeline:
      type: object
      required:
        - weeks
        - trendDirection
      description: |
        Multi-week commit activity for a single RCDO outcome.

        Contains an ordered list of per-week data points (oldest first) and
        a derived `trendDirection` comparing the two most recent weeks.
      properties:
        weeks:
          type: array
          description: Ordered per-week data points, oldest first
          items:
            $ref: "#/components/schemas/OutcomeCoverageWeek"
        trendDirection:
          type: string
          enum:
            - RISING
            - FALLING
            - STABLE
          description: |
            Derived trend from the most recent two weeks.
            `RISING` when the latest week commit count exceeds the prior week;
            `FALLING` when it is lower; `STABLE` when equal or fewer than two
            data points are available.
    OutcomeCoverageWeek:
      type: object
      required:
        - weekStart
        - commitCount
        - contributorCount
        - highPriorityCount
      description: |
        A single week's commit activity for a specific RCDO outcome.

        Sourced from the `mv_outcome_coverage_weekly` materialized view.
        Weeks with no data produce a row with zero counts.
      properties:
        weekStart:
          type: string
          format: date
          description: ISO-8601 Monday date for this week (e.g. 2026-03-16)
        commitCount:
          type: integer
          minimum: 0
          description: Total strategic commits linked to the outcome this week
        contributorCount:
          type: integer
          minimum: 0
          description: Distinct contributors who made commits linked to the outcome this
            week
        highPriorityCount:
          type: integer
          minimum: 0
          description: Commits with chess priority KING or QUEEN this week
    CarryForwardHeatmap:
      type: object
      required:
        - users
      description: |
        Team-level carry-forward heatmap showing how many commits each direct
        report carried forward each week over the analysis window.

        Users are ordered by userId; weeks within each user row are ordered
        oldest first.
      properties:
        users:
          type: array
          description: Team member rows, one per direct report
          items:
            $ref: "#/components/schemas/HeatmapUser"
    HeatmapUser:
      type: object
      required:
        - userId
        - displayName
        - weekCells
      description: >
        A row in the carry-forward heatmap representing one team member.


        `weekCells` contains an ordered list of per-week carry-forward counts

        (oldest first). Weeks with no data produce a cell with `carriedCount: 0`.
      properties:
        userId:
          type: string
          format: uuid
          description: The team member's user ID
        displayName:
          type: string
          description: Human-readable name from the org-graph / HRIS
        weekCells:
          type: array
          description: Ordered per-week carry-forward counts, oldest first
          items:
            $ref: "#/components/schemas/HeatmapCell"
    HeatmapCell:
      type: object
      required:
        - weekStart
        - carriedCount
      description: |
        A single cell in the carry-forward heatmap, representing one user's
        carry-forward count for one week.
      properties:
        weekStart:
          type: string
          format: date
          description: ISO-8601 Monday date for this cell's week (e.g. 2026-03-16)
        carriedCount:
          type: integer
          minimum: 0
          description: Number of commits the user carried forward into this week
    UserCategoryShift:
      type: object
      required:
        - userId
        - currentDistribution
        - priorDistribution
        - biggestShift
      description: |
        Per-user commit category distribution shift between the prior and
        recent halves of the analysis window.

        Proportions in `currentDistribution` and `priorDistribution` sum to
        approximately 1.0 per user.
      properties:
        userId:
          type: string
          format: uuid
          description: The team member's user ID
        currentDistribution:
          type: object
          description: Category → proportion mapping for the recent half-window
          additionalProperties:
            type: number
            format: double
        priorDistribution:
          type: object
          description: Category → proportion mapping for the prior half-window
          additionalProperties:
            type: number
            format: double
        biggestShift:
          $ref: "#/components/schemas/CategoryShift"
    CategoryShift:
      type: object
      required:
        - category
        - delta
      description: |
        The single largest shift in commit category distribution for a user
        between the prior half-window and the recent half-window.
      properties:
        category:
          type: string
          description: |
            The commit category name that changed the most (e.g. `DELIVERY`,
            `OPERATIONS`, `ENABLEMENT`, `LEARNING`)
        delta:
          type: number
          format: double
          description: |
            Signed change in proportion (recent − prior).
            Positive values indicate the category increased; negative values
            indicate it decreased.
    UserEstimationAccuracy:
      type: object
      required:
        - userId
        - avgConfidence
        - completionRate
        - calibrationGap
      description: |
        Per-user estimation accuracy metrics. Compares a team member's stated
        confidence against their actual completion rate across reconciled
        planning weeks.

        Sourced from the `mv_user_weekly_summary` materialized view.
      properties:
        userId:
          type: string
          format: uuid
          description: The team member's user ID
        avgConfidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: |
            Average confidence score across reconciled weeks. Values are in
            [0, 1] where 1.0 represents full confidence.
        completionRate:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: |
            Ratio of DONE commits to total commits across reconciled weeks.
            Values are in [0, 1].
        calibrationGap:
          type: number
          format: double
          description: |
            `avgConfidence − completionRate`. Positive values indicate
            systematic over-confidence; negative values indicate
            under-confidence.
    Prediction:
      type: object
      required:
        - type
        - likely
        - confidence
        - reason
      description: |
        A single rule-based prediction produced by evaluating historical
        patterns from the analytics materialized views and current plan state.

        Only predictions where `likely: true` are returned by the API
        (actionable alerts only).
      properties:
        type:
          type: string
          enum:
            - CARRY_FORWARD
            - LATE_LOCK
            - COVERAGE_DECLINE
          description: >
            The prediction type identifier:

            - `CARRY_FORWARD`    — pattern of carrying too many items forward

            - `LATE_LOCK`        — habitual late plan submission on lock day

            - `COVERAGE_DECLINE` — strategic outcome coverage declining 3+ consecutive weeks
        likely:
          type: boolean
          description: |
            `true` when the rule conditions are met (this prediction is
            actionable). The API only returns predictions where `likely` is
            `true`.
        confidence:
          type: string
          enum:
            - HIGH
            - MEDIUM
            - LOW
          description: |
            Confidence level of the prediction:
            - `HIGH`   — strong rule signal based on clear historical pattern
            - `MEDIUM` — moderate signal; context may vary
            - `LOW`    — weak signal; informational only
        reason:
          type: string
          description: Human-readable explanation of why the prediction was made
    Milestone:
      type: object
      required:
        - name
        - status
      description: >
        A single milestone within an outcome's milestone-based progress
        tracking.

        Milestone objects are stored as a JSONB array in the `milestones` field

        of OutcomeMetadataRequest/OutcomeMetadataResponse.
      properties:
        name:
          type: string
          description: Human-readable name of the milestone (e.g. "Alpha release")
        weight:
          type: number
          default: 1
          description: |
            Relative weight of this milestone when computing overall progress.
            Defaults to 1.0 if omitted. Higher-weight milestones contribute
            proportionally more to the overall progress percentage.
        status:
          type: string
          enum:
            - PENDING
            - IN_PROGRESS
            - DONE
          description: |
            Current completion status of the milestone:
            - `PENDING`     — not yet started
            - `IN_PROGRESS` — work is in progress
            - `DONE`        — milestone has been completed
    OutcomeMetadataRequest:
      type: object
      description: |
        Request body for creating or updating outcome metadata.

        All fields are optional — omitted fields leave the existing persisted
        value unchanged on update. Set `targetDate` to null explicitly to
        remove target-date tracking.
      properties:
        targetDate:
          type:
            - string
            - "null"
          format: date
          description: >
            Target completion date for the outcome (ISO-8601 date, e.g.
            2026-12-31).

            Set to null to remove target-date tracking; the urgency band will be

            set to `NO_TARGET` on the next recomputation.
        progressType:
          type: string
          enum:
            - ACTIVITY
            - METRIC
            - MILESTONE
          description: >
            Progress tracking model:

            - `ACTIVITY`  — progress is derived from linked weekly commit activity (default)

            - `METRIC`    — progress is tracked via a numeric metric (`currentValue` / `targetValue`)

            - `MILESTONE` — progress is derived from milestone completion (`milestones` array)
        metricName:
          type:
            - string
            - "null"
          maxLength: 200
          description: Descriptive name of the tracked metric (METRIC type only, e.g.
            "ARR" or "NPS")
        targetValue:
          type:
            - number
            - "null"
          description: Numeric goal value for the metric (METRIC type only)
        currentValue:
          type:
            - number
            - "null"
          description: Current metric value (METRIC type only)
        unit:
          type:
            - string
            - "null"
          maxLength: 50
          description: Unit of measurement, e.g. "%" or "USD" (METRIC type only)
        milestones:
          type:
            - string
            - "null"
          contentMediaType: application/json
          contentSchema:
            type: array
            description: Array of milestone objects (MILESTONE type only)
            items:
              $ref: "#/components/schemas/Milestone"
          description: >
            JSON-encoded array of milestone objects (stored as JSONB). Each

            object conforms to the `Milestone` schema. Example:

            `[{"name":"Alpha","weight":1.0,"status":"DONE"},{"name":"Beta","weight":2.0,"status":"PENDING"}]`

            (MILESTONE type only)
    OutcomeMetadataResponse:
      type: object
      required:
        - orgId
        - outcomeId
        - progressType
        - createdAt
        - updatedAt
      description: |
        Full outcome metadata record including computed urgency fields.

        The `urgencyBand`, `progressPct`, and `lastComputedAt` fields are null
        when urgency has not been computed yet (i.e., immediately after creation
        before the first scheduled or on-demand recomputation).
      properties:
        orgId:
          type: string
          format: uuid
          description: UUID of the organisation this record belongs to
        outcomeId:
          type: string
          format: uuid
          description: UUID of the RCDO outcome
        targetDate:
          type:
            - string
            - "null"
          format: date
          description: Target completion date for the outcome; null if not set
        progressType:
          type: string
          enum:
            - ACTIVITY
            - METRIC
            - MILESTONE
          description: Progress tracking model in use for this outcome
        metricName:
          type:
            - string
            - "null"
          description: Descriptive name of the tracked metric; null when not applicable
        targetValue:
          type:
            - number
            - "null"
          description: Numeric goal value; null when not applicable
        currentValue:
          type:
            - number
            - "null"
          description: Current metric value; null when not applicable
        unit:
          type:
            - string
            - "null"
          description: Unit of measurement; null when not applicable
        milestones:
          type:
            - string
            - "null"
          contentMediaType: application/json
          contentSchema:
            type: array
            description: Array of milestone objects
            items:
              $ref: "#/components/schemas/Milestone"
          description: Raw JSON-encoded array of milestone objects; null when not applicable
        progressPct:
          type:
            - number
            - "null"
          minimum: 0
          maximum: 100
          description: |
            Computed progress percentage (0–100). Null when urgency has not been
            computed yet.
        urgencyBand:
          type:
            - string
            - "null"
          enum:
            - NO_TARGET
            - ON_TRACK
            - NEEDS_ATTENTION
            - AT_RISK
            - CRITICAL
            - null
          description: >
            Computed urgency classification. Null when urgency has not been

            computed yet.


            | Band              | Meaning                                                           |

            |-------------------|-------------------------------------------------------------------|

            | `NO_TARGET`       | No target date is set for this outcome                           |

            | `ON_TRACK`        | Progress gap (expected − actual) is < 10%                        |

            | `NEEDS_ATTENTION` | Progress gap is 10%–25%                                          |

            | `AT_RISK`         | Progress gap is > 25%                                            |

            | `CRITICAL`        | Due today or overdue, OR ≤ 30 days remaining with < 50% progress |
        lastComputedAt:
          type:
            - string
            - "null"
          format: date-time
          description: ISO-8601 UTC timestamp of the last urgency computation; null if not
            yet computed
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 UTC timestamp when this metadata record was created
        updatedAt:
          type: string
          format: date-time
          description: ISO-8601 UTC timestamp of the last update to this record
    ProgressUpdateRequest:
      type: object
      description: |
        Lightweight progress update request. Both fields are optional — supply
        only the ones that need updating.
      properties:
        currentValue:
          type:
            - number
            - "null"
          description: Updated current value of the tracked metric; null if unchanged
        milestones:
          type:
            - string
            - "null"
          contentMediaType: application/json
          contentSchema:
            type: array
            description: Array of milestone objects
            items:
              $ref: "#/components/schemas/Milestone"
          description: |
            Updated JSON-encoded array of milestone objects. Replaces the
            entire existing milestones array; null if unchanged.
    UrgencyInfo:
      type: object
      required:
        - outcomeId
        - outcomeName
        - urgencyBand
        - daysRemaining
      description: |
        Urgency snapshot for a single RCDO outcome.

        Produced by the urgency computation pipeline and consumed by downstream
        phases without depending on outcome metadata internals.
      properties:
        outcomeId:
          type: string
          format: uuid
          description: UUID of the RCDO outcome
        outcomeName:
          type: string
          description: Display name of the outcome
        targetDate:
          type:
            - string
            - "null"
          format: date
          description: Target completion date; null if no target date is set
        progressPct:
          type:
            - number
            - "null"
          minimum: 0
          maximum: 100
          description: Current progress percentage (0–100); null if not yet computed
        expectedProgressPct:
          type:
            - number
            - "null"
          minimum: 0
          maximum: 100
          description: |
            Expected progress percentage at today's date assuming linear
            progression from start to target date. Null when no target date
            is set.
        urgencyBand:
          $ref: "#/components/schemas/OutcomeUrgencyBand"
          description: Computed urgency classification for this outcome
        daysRemaining:
          type: integer
          description: |
            Calendar days from today to the target date. Negative when the
            target date is in the past (overdue). Set to the minimum integer
            value (`Long.MIN_VALUE`) when no target date is set.
    SlackInfo:
      type: object
      required:
        - slackBand
        - strategicFocusFloor
        - atRiskCount
        - criticalCount
      description: |
        Strategic slack summary derived from the distribution of urgency bands
        across the organisation's RCDO outcome portfolio.

        The `strategicFocusFloor` is the recommended minimum fraction of weekly
        commits that should target strategic outcomes, computed from the ratio
        of at-risk and critical outcomes.
      properties:
        slackBand:
          type: string
          enum:
            - HIGH_SLACK
            - MODERATE_SLACK
            - LOW_SLACK
            - NO_SLACK
          description: |
            High-level slack classification:
            - `HIGH_SLACK`     — low urgency pressure; floor ≤ 0.55
            - `MODERATE_SLACK` — moderate urgency pressure; 0.56 ≤ floor ≤ 0.70
            - `LOW_SLACK`      — high urgency pressure; 0.71 ≤ floor ≤ 0.85
            - `NO_SLACK`       — critical urgency pressure; 0.86 ≤ floor ≤ 0.95
        strategicFocusFloor:
          type: number
          minimum: 0.5
          maximum: 0.95
          description: |
            Computed strategic focus floor in the range 0.50–0.95. Represents
            the recommended minimum fraction of commits that should be linked
            to strategic RCDO outcomes given the current urgency landscape.
        atRiskCount:
          type: integer
          minimum: 0
          description: Number of outcomes currently in the AT_RISK urgency band
        criticalCount:
          type: integer
          minimum: 0
          description: Number of outcomes currently in the CRITICAL urgency band
    UrgencySummaryResponse:
      type: object
      required:
        - outcomes
      description: |
        Response payload for the urgency summary endpoint.
        Contains a list of urgency snapshots for all tracked RCDO outcomes in
        the authenticated user's organisation.
      properties:
        outcomes:
          type: array
          description: >
            Urgency snapshots for all outcomes that have a configured target
            date.

            Ordered by urgency severity (CRITICAL first) then by days remaining

            ascending.
          items:
            $ref: "#/components/schemas/UrgencyInfo"
    StrategicSlackResponse:
      type: object
      required:
        - slack
      description: Response payload for the strategic slack endpoint.
      properties:
        slack:
          $ref: "#/components/schemas/SlackInfo"
    OvercommitWarning:
      type: object
      required:
        - level
        - message
      description: Warning about a detected overcommitment in a user's plan.
      properties:
        level:
          type: string
          enum:
            - NONE
            - MODERATE
            - HIGH
          description: Overcommitment severity
        message:
          type: string
          description: Human-readable overcommitment warning message shown in the UI
        adjustedTotal:
          type: number
          format: double
          nullable: true
          description: Bias-adjusted total hour estimate for the plan
        realisticCap:
          type: number
          format: double
          nullable: true
          description: The user's p50 realistic weekly capacity cap
  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: Valid JWT but insufficient access
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: "#/components/schemas/ApiError"
    Conflict:
      description: State conflict (version mismatch, invalid transition)
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: "#/components/schemas/ApiError"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: "#/components/schemas/ApiError"
    ServiceUnavailable:
      description: Backing service unavailable
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: "#/components/schemas/ApiError"
