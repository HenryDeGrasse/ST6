openapi: 3.1.0
info:
  title: Weekly Commitments API
  description: |
    API for the Weekly Commitments module – plan creation, lifecycle management,
    reconciliation, manager review, RCDO integration, and AI-assisted suggestions.
  version: 1.0.0
  contact:
    name: ST6 Engineering

servers:
  - url: /api/v1
    description: API v1 base path

security:
  - BearerAuth: []

tags:
  - name: Plans
    description: Weekly plan lifecycle operations
  - name: Commits
    description: Weekly commitment CRUD
  - name: Manager
    description: Manager dashboard and review
  - name: RCDO
    description: Rally Cry / Defining Objective / Outcome read-through
  - name: AI
    description: AI-assisted suggestion endpoints

paths:
  /weeks/{weekStart}/plans:
    post:
      operationId: createPlan
      summary: Create a weekly plan
      description: |
        Create a plan for the specified week. Idempotent: returns 201 on create,
        200 if the plan already exists for this user/week.
      tags: [Plans]
      parameters:
        - $ref: '#/components/parameters/WeekStartPath'
      responses:
        '200':
          description: Plan already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyPlan'
        '201':
          description: Plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyPlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /weeks/{weekStart}/plans/me:
    get:
      operationId: getMyPlan
      summary: Get my plan for a given week
      tags: [Plans]
      parameters:
        - $ref: '#/components/parameters/WeekStartPath'
      responses:
        '200':
          description: Plan found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyPlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /plans/{planId}:
    get:
      operationId: getPlan
      summary: Get plan by ID
      description: Accessible by the plan owner or their manager.
      tags: [Plans]
      parameters:
        - $ref: '#/components/parameters/PlanIdPath'
      responses:
        '200':
          description: Plan found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyPlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /weeks/{weekStart}/plans/{userId}:
    get:
      operationId: getUserPlan
      summary: Get a user's plan (manager-only)
      tags: [Plans]
      parameters:
        - $ref: '#/components/parameters/WeekStartPath'
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Plan found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyPlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /weeks/{weekStart}/plans/{userId}/commits:
    get:
      operationId: getUserPlanCommits
      summary: Get a user's commits for the selected week (manager-only)
      tags: [Plans, Commits]
      parameters:
        - $ref: '#/components/parameters/WeekStartPath'
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Commit list for the user's weekly plan
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WeeklyCommit'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /plans/{planId}/lock:
    post:
      operationId: lockPlan
      summary: Lock a weekly plan
      description: |
        Transitions a plan from DRAFT to LOCKED. Validates all commits,
        populates RCDO snapshots, and enforces chess rules.
      tags: [Plans]
      parameters:
        - $ref: '#/components/parameters/PlanIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Plan locked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyPlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /plans/{planId}/start-reconciliation:
    post:
      operationId: startReconciliation
      summary: Start reconciliation
      description: |
        Transitions a plan from LOCKED to RECONCILING. If the plan is in
        DRAFT and the week has passed, performs a late lock first.
      tags: [Plans]
      parameters:
        - $ref: '#/components/parameters/PlanIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Reconciliation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyPlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /plans/{planId}/submit-reconciliation:
    post:
      operationId: submitReconciliation
      summary: Submit reconciliation
      description: |
        Transitions from RECONCILING to RECONCILED. Requires all commits
        to have completionStatus and deltaReason for non-DONE items.
      tags: [Plans]
      parameters:
        - $ref: '#/components/parameters/PlanIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Reconciliation submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyPlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /plans/{planId}/carry-forward:
    post:
      operationId: carryForward
      summary: Carry forward incomplete commits
      description: |
        Copies selected commits into the next week's plan (DRAFT).
        Transitions the current plan to CARRY_FORWARD.
      tags: [Plans]
      parameters:
        - $ref: '#/components/parameters/PlanIdPath'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarryForwardRequest'
      responses:
        '200':
          description: Carry-forward executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyPlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /plans/{planId}/commits:
    get:
      operationId: listCommits
      summary: List commits for a plan
      tags: [Commits]
      parameters:
        - $ref: '#/components/parameters/PlanIdPath'
      responses:
        '200':
          description: Commits returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WeeklyCommit'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createCommit
      summary: Create a new commit
      tags: [Commits]
      parameters:
        - $ref: '#/components/parameters/PlanIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommitRequest'
      responses:
        '201':
          description: Commit created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyCommit'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /commits/{commitId}:
    patch:
      operationId: updateCommit
      summary: Partially update a commit
      tags: [Commits]
      parameters:
        - $ref: '#/components/parameters/CommitIdPath'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommitRequest'
      responses:
        '200':
          description: Commit updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyCommit'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      operationId: deleteCommit
      summary: Delete a commit (DRAFT only)
      tags: [Commits]
      parameters:
        - $ref: '#/components/parameters/CommitIdPath'
      responses:
        '204':
          description: Commit deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /commits/{commitId}/actual:
    patch:
      operationId: updateActual
      summary: Update reconciliation data for a commit
      tags: [Commits]
      parameters:
        - $ref: '#/components/parameters/CommitIdPath'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateActualRequest'
      responses:
        '200':
          description: Actual updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyCommitActual'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /weeks/{weekStart}/team/summary:
    get:
      operationId: getTeamSummary
      summary: Manager team dashboard
      description: |
        Returns a paginated, filtered summary of direct reports' plans
        for the given week.
      tags: [Manager]
      parameters:
        - $ref: '#/components/parameters/WeekStartPath'
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: state
          in: query
          schema:
            $ref: '#/components/schemas/PlanState'
        - name: outcomeId
          in: query
          schema:
            type: string
            format: uuid
        - name: incomplete
          in: query
          schema:
            type: boolean
        - name: nonStrategic
          in: query
          schema:
            type: boolean
        - name: priority
          in: query
          schema:
            $ref: '#/components/schemas/ChessPriority'
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/CommitCategory'
      responses:
        '200':
          description: Team summary returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /weeks/{weekStart}/team/rcdo-rollup:
    get:
      operationId: getRcdoRollup
      summary: RCDO roll-up for manager dashboard
      description: |
        Returns commits grouped by RCDO outcome across direct reports,
        with chess priority distribution and non-strategic counts.
      tags: [Manager]
      parameters:
        - $ref: '#/components/parameters/WeekStartPath'
      responses:
        '200':
          description: RCDO roll-up returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RcdoRollupResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /notifications/unread:
    get:
      operationId: getUnreadNotifications
      summary: Get unread in-app notifications
      description: |
        Returns unread notifications for the current user, newest first.
        MVP renders in-app banners on page load.
      tags: [Notifications]
      responses:
        '200':
          description: Unread notifications returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/{notificationId}/read:
    post:
      operationId: markNotificationRead
      summary: Mark a notification as read
      tags: [Notifications]
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Notification marked as read
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      summary: Mark all notifications as read
      tags: [Notifications]
      responses:
        '204':
          description: All notifications marked as read
        '401':
          $ref: '#/components/responses/Unauthorized'

  /plans/{planId}/review:
    post:
      operationId: createReview
      summary: Submit manager review
      description: |
        Manager approves or requests changes to a plan. Request changes
        is blocked if carry-forward has already been executed.
      tags: [Manager]
      parameters:
        - $ref: '#/components/parameters/PlanIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '200':
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagerReview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /rcdo/tree:
    get:
      operationId: getRcdoTree
      summary: Get RCDO hierarchy
      tags: [RCDO]
      responses:
        '200':
          description: RCDO tree returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RcdoTreeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /rcdo/search:
    get:
      operationId: searchRcdo
      summary: Typeahead search for RCDO outcomes
      tags: [RCDO]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RcdoSearchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /ai/suggest-rcdo:
    post:
      operationId: suggestRcdo
      summary: AI-assisted RCDO suggestion
      description: |
        Given a commit title and description, returns ranked RCDO suggestions.
        Returns 200 with empty suggestions on LLM unavailability.
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuggestRcdoRequest'
      responses:
        '200':
          description: Suggestions returned (may be empty if AI unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestRcdoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Rate limit exceeded

  /ai/draft-reconciliation:
    post:
      operationId: draftReconciliation
      summary: AI-drafted reconciliation (beta)
      description: |
        Returns AI-suggested completion statuses and delta summaries
        for all commits in a plan.
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DraftReconciliationRequest'
      responses:
        '200':
          description: Reconciliation draft returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftReconciliationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Rate limit exceeded

  /ai/manager-insights:
    post:
      operationId: managerInsights
      summary: AI manager dashboard insights (beta)
      description: |
        Returns AI-generated manager insight summaries for a dashboard week.
        Returns 200 with empty insights when AI is unavailable.
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManagerInsightsRequest'
      responses:
        '200':
          description: Manager insights returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagerInsightsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Rate limit exceeded

  /health:
    get:
      operationId: healthCheck
      summary: Service health check
      security: []
      tags: [Plans]
      responses:
        '200':
          description: Service is healthy

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    WeekStartPath:
      name: weekStart
      in: path
      required: true
      description: ISO date of the Monday that starts the week (e.g., 2026-03-09)
      schema:
        type: string
        format: date

    PlanIdPath:
      name: planId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    CommitIdPath:
      name: commitId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        format: uuid

    IfMatch:
      name: If-Match
      in: header
      required: true
      description: Optimistic lock version number
      schema:
        type: integer

  schemas:
    PlanState:
      type: string
      enum: [DRAFT, LOCKED, RECONCILING, RECONCILED, CARRY_FORWARD]

    ReviewStatus:
      type: string
      enum: [REVIEW_NOT_APPLICABLE, REVIEW_PENDING, CHANGES_REQUESTED, APPROVED]

    ChessPriority:
      type: string
      enum: [KING, QUEEN, ROOK, BISHOP, KNIGHT, PAWN]

    CompletionStatus:
      type: string
      enum: [DONE, PARTIALLY, NOT_DONE, DROPPED]

    LockType:
      type: string
      enum: [ON_TIME, LATE_LOCK]

    CommitCategory:
      type: string
      enum: [DELIVERY, OPERATIONS, CUSTOMER, GTM, PEOPLE, LEARNING, TECH_DEBT]

    WeeklyPlan:
      type: object
      required: [id, orgId, ownerUserId, weekStartDate, state, reviewStatus, version, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        ownerUserId:
          type: string
          format: uuid
        weekStartDate:
          type: string
          format: date
        state:
          $ref: '#/components/schemas/PlanState'
        reviewStatus:
          $ref: '#/components/schemas/ReviewStatus'
        lockType:
          $ref: '#/components/schemas/LockType'
        lockedAt:
          type: string
          format: date-time
          nullable: true
        carryForwardExecutedAt:
          type: string
          format: date-time
          nullable: true
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ValidationError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

    WeeklyCommit:
      type: object
      required: [id, weeklyPlanId, title, description, expectedResult, progressNotes, tags, version, createdAt, updatedAt, validationErrors]
      properties:
        id:
          type: string
          format: uuid
        weeklyPlanId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        chessPriority:
          $ref: '#/components/schemas/ChessPriority'
        category:
          $ref: '#/components/schemas/CommitCategory'
        outcomeId:
          type: string
          format: uuid
          nullable: true
        nonStrategicReason:
          type: string
          nullable: true
        expectedResult:
          type: string
        confidence:
          type: number
          nullable: true
        tags:
          type: array
          items:
            type: string
        progressNotes:
          type: string
        snapshotRallyCryId:
          type: string
          format: uuid
          nullable: true
        snapshotRallyCryName:
          type: string
          nullable: true
        snapshotObjectiveId:
          type: string
          format: uuid
          nullable: true
        snapshotObjectiveName:
          type: string
          nullable: true
        snapshotOutcomeId:
          type: string
          format: uuid
          nullable: true
        snapshotOutcomeName:
          type: string
          nullable: true
        carriedFromCommitId:
          type: string
          format: uuid
          nullable: true
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        validationErrors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
        actual:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/WeeklyCommitActual'

    WeeklyCommitActual:
      type: object
      required: [commitId, actualResult, completionStatus]
      properties:
        commitId:
          type: string
          format: uuid
        actualResult:
          type: string
        completionStatus:
          $ref: '#/components/schemas/CompletionStatus'
        deltaReason:
          type: string
          nullable: true
        timeSpent:
          type: number
          nullable: true

    ManagerReview:
      type: object
      required: [id, weeklyPlanId, reviewerUserId, decision, comments, createdAt]
      properties:
        id:
          type: string
          format: uuid
        weeklyPlanId:
          type: string
          format: uuid
        reviewerUserId:
          type: string
          format: uuid
        decision:
          type: string
          enum: [APPROVED, CHANGES_REQUESTED]
        comments:
          type: string
        createdAt:
          type: string
          format: date-time

    CarryForwardRequest:
      type: object
      required: [commitIds]
      properties:
        commitIds:
          type: array
          items:
            type: string
            format: uuid

    CreateCommitRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
          default: ''
        chessPriority:
          $ref: '#/components/schemas/ChessPriority'
        category:
          $ref: '#/components/schemas/CommitCategory'
        outcomeId:
          type: string
          format: uuid
          nullable: true
        nonStrategicReason:
          type: string
          nullable: true
        expectedResult:
          type: string
          default: ''
        confidence:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
        tags:
          type: array
          items:
            type: string
          default: []

    UpdateCommitRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
        chessPriority:
          $ref: '#/components/schemas/ChessPriority'
        category:
          $ref: '#/components/schemas/CommitCategory'
        outcomeId:
          type: string
          format: uuid
          nullable: true
        nonStrategicReason:
          type: string
          nullable: true
        expectedResult:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
        tags:
          type: array
          items:
            type: string
        progressNotes:
          type: string

    UpdateActualRequest:
      type: object
      required: [actualResult, completionStatus]
      properties:
        actualResult:
          type: string
        completionStatus:
          $ref: '#/components/schemas/CompletionStatus'
        deltaReason:
          type: string
          nullable: true
        timeSpent:
          type: number
          nullable: true

    CreateReviewRequest:
      type: object
      required: [decision, comments]
      properties:
        decision:
          type: string
          enum: [APPROVED, CHANGES_REQUESTED]
        comments:
          type: string

    TeamSummaryResponse:
      type: object
      required: [weekStart, users, reviewStatusCounts, page, size, totalElements, totalPages]
      properties:
        weekStart:
          type: string
          format: date
        users:
          type: array
          items:
            $ref: '#/components/schemas/TeamMemberSummary'
        reviewStatusCounts:
          $ref: '#/components/schemas/ReviewStatusCounts'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    TeamMemberSummary:
      type: object
      required: [userId, commitCount, incompleteCount, issueCount, nonStrategicCount, kingCount, queenCount, isStale, isLateLock]
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
          nullable: true
        planId:
          type: string
          format: uuid
          nullable: true
        state:
          $ref: '#/components/schemas/PlanState'
        reviewStatus:
          $ref: '#/components/schemas/ReviewStatus'
        commitCount:
          type: integer
        incompleteCount:
          type: integer
          description: Count of saved actuals with completionStatus != DONE for RECONCILED/CARRY_FORWARD plans
        issueCount:
          type: integer
          description: Count of commits with validation errors (missing required fields)
        nonStrategicCount:
          type: integer
        kingCount:
          type: integer
        queenCount:
          type: integer
        lastUpdated:
          type: string
          format: date-time
          nullable: true
        isStale:
          type: boolean
        isLateLock:
          type: boolean

    ReviewStatusCounts:
      type: object
      required: [pending, approved, changesRequested]
      properties:
        pending:
          type: integer
        approved:
          type: integer
        changesRequested:
          type: integer

    RcdoRollupResponse:
      type: object
      required: [weekStart, items, nonStrategicCount]
      properties:
        weekStart:
          type: string
          format: date
        items:
          type: array
          items:
            $ref: '#/components/schemas/RcdoRollupItem'
        nonStrategicCount:
          type: integer

    RcdoRollupItem:
      type: object
      required: [outcomeId, commitCount, kingCount, queenCount, rookCount, bishopCount, knightCount, pawnCount]
      properties:
        outcomeId:
          type: string
          format: uuid
        outcomeName:
          type: string
          nullable: true
        objectiveId:
          type: string
          format: uuid
          nullable: true
        objectiveName:
          type: string
          nullable: true
        rallyCryId:
          type: string
          format: uuid
          nullable: true
        rallyCryName:
          type: string
          nullable: true
        commitCount:
          type: integer
        kingCount:
          type: integer
        queenCount:
          type: integer
        rookCount:
          type: integer
        bishopCount:
          type: integer
        knightCount:
          type: integer
        pawnCount:
          type: integer

    Notification:
      type: object
      required: [id, type, payload, read, createdAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        payload:
          type: object
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    RcdoTreeResponse:
      type: object
      required: [rallyCries]
      properties:
        rallyCries:
          type: array
          items:
            $ref: '#/components/schemas/RcdoCry'

    RcdoCry:
      type: object
      required: [id, name, objectives]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        objectives:
          type: array
          items:
            $ref: '#/components/schemas/RcdoObjective'

    RcdoObjective:
      type: object
      required: [id, name, rallyCryId, outcomes]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        rallyCryId:
          type: string
          format: uuid
        outcomes:
          type: array
          items:
            $ref: '#/components/schemas/RcdoOutcome'

    RcdoOutcome:
      type: object
      required: [id, name, objectiveId]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        objectiveId:
          type: string
          format: uuid

    RcdoSearchResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/RcdoSearchResult'

    RcdoSearchResult:
      type: object
      required: [id, name, objectiveId, objectiveName, rallyCryId, rallyCryName]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        objectiveId:
          type: string
          format: uuid
        objectiveName:
          type: string
        rallyCryId:
          type: string
          format: uuid
        rallyCryName:
          type: string

    SuggestRcdoRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string

    SuggestRcdoResponse:
      type: object
      required: [status, suggestions]
      properties:
        status:
          type: string
          enum: [ok, unavailable]
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/RcdoSuggestion'

    RcdoSuggestion:
      type: object
      required: [outcomeId, rallyCryName, objectiveName, outcomeName, confidence, rationale]
      properties:
        outcomeId:
          type: string
          format: uuid
        rallyCryName:
          type: string
        objectiveName:
          type: string
        outcomeName:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        rationale:
          type: string

    DraftReconciliationRequest:
      type: object
      required: [planId]
      properties:
        planId:
          type: string
          format: uuid

    DraftReconciliationResponse:
      type: object
      required: [status, drafts]
      properties:
        status:
          type: string
          enum: [ok, unavailable]
        drafts:
          type: array
          items:
            $ref: '#/components/schemas/ReconciliationDraftItem'

    ReconciliationDraftItem:
      type: object
      required: [commitId, suggestedStatus, suggestedActualResult]
      properties:
        commitId:
          type: string
          format: uuid
        suggestedStatus:
          $ref: '#/components/schemas/CompletionStatus'
        suggestedDeltaReason:
          type: string
          nullable: true
        suggestedActualResult:
          type: string

    ManagerInsightsRequest:
      type: object
      required: [weekStart]
      properties:
        weekStart:
          type: string
          format: date

    ManagerInsightsResponse:
      type: object
      required: [status, insights]
      properties:
        status:
          type: string
          enum: [ok, unavailable]
        headline:
          type: string
          nullable: true
        insights:
          type: array
          items:
            $ref: '#/components/schemas/ManagerInsightItem'

    ManagerInsightItem:
      type: object
      required: [title, detail, severity]
      properties:
        title:
          type: string
        detail:
          type: string
        severity:
          type: string
          enum: [INFO, WARNING, POSITIVE]

    ApiError:
      type: object
      required: [code, message, details]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/ApiError'

    Forbidden:
      description: Valid JWT but insufficient access
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/ApiError'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/ApiError'

    Conflict:
      description: State conflict (version mismatch, invalid transition)
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/ApiError'

    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/ApiError'

    ServiceUnavailable:
      description: Backing service unavailable
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/ApiError'
