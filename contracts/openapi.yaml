            Defaults to the current Monday if omitted.
    SuggestNextWorkResponse:
      type: object
      required:
        - status
        - suggestions
      properties:
        status:
          type: string
          enum:
            - ok
            - unavailable
          description: ok when suggestions were computed; unavailable when flag is disabled
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/NextWorkSuggestion"
    NextWorkSuggestion:
      type: object
      required:
        - suggestionId
        - title
        - confidence
        - source
        - sourceDetail
        - rationale
      properties:
        suggestionId:
          type: string
          format: uuid
          description: Stable deterministic ID for feedback correlation
        title:
          type: string
          description: Suggested commit title
        suggestedOutcomeId:
          type: string
          format: uuid
          nullable: true
          description: RCDO outcome UUID (null for non-strategic carry-forward items)
        suggestedChessPriority:
          allOf:
            - $ref: "#/components/schemas/ChessPriority"
          nullable: true
          description: Recommended chess priority (null when no recommendation available)
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Confidence score for this suggestion
        source:
          type: string
          enum:
            - CARRY_FORWARD
            - COVERAGE_GAP
            - EXTERNAL_TICKET
          description: How this suggestion was generated
        sourceDetail:
          type: string
          description: Human-readable detail about the suggestion source
        rationale:
          type: string
          description: Human-readable explanation of why this item is suggested
        externalTicketUrl:
          type: string
          nullable: true
          description: |
            URL to the ticket in the provider's web UI.
            Only present when source is EXTERNAL_TICKET.
        externalTicketStatus:
          type: string
          nullable: true
          description: >
            Last-synced status label from the external provider (e.g. "In
            Progress").

            Only present when source is EXTERNAL_TICKET.
    SuggestionFeedbackRequest:
      type: object
      required:
        - suggestionId
