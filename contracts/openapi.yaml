    OrgPolicy:
      type: object
      required:
        - chessKingRequired
        - chessMaxKing
        - chessMaxQueen
        - lockDay
        - lockTime
        - reconcileDay
        - reconcileTime
        - blockLockOnStaleRcdo
        - rcdoStalenessThresholdMinutes
        - digestDay
        - digestTime
      description: >
        Immutable snapshot of an org's configuration. Returned by the admin
        org-policy endpoints.
      properties:
        chessKingRequired:
          type: boolean
          description: Whether at least one KING commit is required to lock a plan
        chessMaxKing:
          type: integer
          description: Maximum KING commits allowed per plan
        chessMaxQueen:
          type: integer
          description: Maximum QUEEN commits allowed per plan
        lockDay:
          type: string
          description: Day-of-week for the plan lock reminder (e.g. "MONDAY")
        lockTime:
          type: string
          description: Wall-clock time for the plan lock reminder in HH:mm format (e.g.
            "10:00")
        reconcileDay:
          type: string
          description: Day-of-week for the reconciliation reminder (e.g. "FRIDAY")
        reconcileTime:
          type: string
          description: Wall-clock time for the reconciliation reminder in HH:mm format
            (e.g. "16:00")
        blockLockOnStaleRcdo:
          type: boolean
          description: Whether locking is blocked when RCDO data is stale
        rcdoStalenessThresholdMinutes:
          type: integer
          description: How many minutes before RCDO data is considered stale
        digestDay:
          type: string
          description: >
            Day-of-week for the weekly digest notification (e.g. "FRIDAY").

            The DigestJob fires once the current time is on or after digestTime on this day.
        digestTime:
          type: string
          pattern: ^(?:[01]\\d|2[0-3]):[0-5]\\d$
          description: Wall-clock time for the weekly digest in valid 24-hour HH:mm format
            (e.g. "17:00")
    UpdateDigestConfigRequest:
      type: object
      required:
        - digestDay
        - digestTime
      description: Request body for updating the org's weekly digest schedule.
      properties:
        digestDay:
          type: string
          description: |
            Day-of-week for the weekly digest (e.g. "FRIDAY", "MONDAY").
            Must be a valid Java DayOfWeek name in any case.
          example: FRIDAY
        digestTime:
          type: string
          pattern: ^(?:[01]\\d|2[0-3]):[0-5]\\d$
          description: Wall-clock time for the weekly digest in valid 24-hour HH:mm format
            (e.g. "17:00")
          example: 17:00
    AdoptionMetrics:
      type: object
      required:
        - weeks
        - windowStart
        - windowEnd
        - totalActiveUsers
        - cadenceComplianceRate
        - weeklyPoints
      description: |
        Weekly adoption funnel metrics produced by the admin dashboard.
        Each week in the rolling window is broken down into funnel stages.
      properties:
        weeks:
          type: integer
          description: Number of weeks in the rolling window
        windowStart:
          type: string
          format: date
          description: Monday at the start of the rolling window
        windowEnd:
          type: string
          format: date
          description: Monday at the end of the rolling window (current week)
        totalActiveUsers:
          type: integer
          description: Distinct users with any plan in the rolling window
        cadenceComplianceRate:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Fraction of locked plans that were locked ON_TIME (not LATE_LOCK)
        weeklyPoints:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyAdoptionPoint"
          description: Per-week funnel breakdown, oldest to newest
    WeeklyAdoptionPoint:
      type: object
      required:
        - weekStart
        - activeUsers
        - plansCreated
        - plansLocked
        - plansReconciled
        - plansReviewed
      description: Adoption funnel counts for a single week.
      properties:
        weekStart:
          type: string
          format: date
          description: Monday of this week
        activeUsers:
          type: integer
          description: Distinct users with any plan this week
        plansCreated:
          type: integer
          description: Total plans in any state this week
        plansLocked:
          type: integer
          description: Plans that reached LOCKED state or beyond
        plansReconciled:
          type: integer
          description: Plans that reached RECONCILED or CARRY_FORWARD state
        plansReviewed:
          type: integer
          description: Plans where a manager review was submitted (APPROVED or
            CHANGES_REQUESTED)
    AiUsageMetrics:
      type: object
      required:
        - weeks
        - windowStart
        - windowEnd
        - totalFeedbackCount
        - acceptedCount
        - deferredCount
        - declinedCount
        - acceptanceRate
        - cacheHits
        - cacheMisses
        - cacheHitRate
        - approximateTokensSpent
        - approximateTokensSaved
      description: AI feature usage metrics over a rolling window.
      properties:
        weeks:
          type: integer
          description: Number of weeks in the rolling window
        windowStart:
          type: string
          format: date
          description: Start of the rolling window
        windowEnd:
          type: string
          format: date
          description: End of the rolling window
        totalFeedbackCount:
          type: integer
          format: int64
          description: Total suggestion feedback records in the window
        acceptedCount:
          type: integer
          format: int64
          description: Count of ACCEPT actions
        deferredCount:
          type: integer
          format: int64
          description: Count of DEFER actions
        declinedCount:
          type: integer
          format: int64
          description: Count of DECLINE actions
        acceptanceRate:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: acceptedCount / totalFeedbackCount (0 if no feedback)
        cacheHits:
          type: integer
          format: int64
          description: >
            Cumulative AI cache hits attributed to this org since the last
            service restart.
        cacheMisses:
          type: integer
          format: int64
          description: Cumulative AI cache misses attributed to this org since the last
            service restart
        cacheHitRate:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: cacheHits / (cacheHits + cacheMisses) (0 if no cache activity)
        approximateTokensSpent:
          type: integer
          format: int64
          description: >
            Coarse estimate of AI tokens spent for this org since the last
            service restart.

            Computed as cacheMisses × 1000 tokens/request.
        approximateTokensSaved:
          type: integer
          format: int64
          description: >
            Coarse estimate of AI tokens avoided by cache hits for this org
            since the last

            service restart. Computed as cacheHits × 1000 tokens/request.
