        - expectedResult
        - progressNotes
        - tags
        - version
        - createdAt
        - updatedAt
        - validationErrors
      properties:
        id:
          type: string
          format: uuid
        weeklyPlanId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        chessPriority:
