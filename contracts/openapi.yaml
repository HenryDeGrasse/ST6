openapi: 3.1.0
info:
  title: Weekly Commitments API
  description: >
    API for the Weekly Commitments module – plan creation, lifecycle management,

    reconciliation, manager review, RCDO integration, and AI-assisted suggestions.
  version: 1.0.0
  contact:
    name: ST6 Engineering
servers:
  - url: /api/v1
    description: API v1 base path
security:
  - BearerAuth: []
tags:
  - name: Plans
    description: Weekly plan lifecycle operations
  - name: Commits
    description: Weekly commitment CRUD
  - name: Manager
    description: Manager dashboard and review
  - name: RCDO
    description: Rally Cry / Defining Objective / Outcome read-through
  - name: AI
    description: AI-assisted suggestion endpoints
  - name: Trends
    description: Cross-week planning trend analytics (Wave 1)
  - name: Admin
    description: Administrative configuration endpoints (ADMIN role required)
  - name: Integrations
    description: External issue-tracker integrations (Jira, Linear) — Wave 4
  - name: Capacity
    description: Capacity planning and estimation coaching (Phase 4)
  - name: Notifications
    description: In-app notification endpoints
  - name: QuickUpdate
    description: Rapid-fire batch check-in flow (Phase 1)
  - name: UserProfile
    description: User model and behavioural profile (Phase 1)
  - name: Analytics
    description: |
      Multi-week descriptive and diagnostic analytics for the manager
      dashboard (Phase 2 — Strategic Intelligence).
  - name: Outcome Metadata
    description: |
      CRUD operations for RCDO outcome metadata — target dates, progress
      tracking configuration, and computed urgency bands (Phase 3).
  - name: Urgency
    description: |
      Urgency summary and strategic slack APIs for the RCDO outcome portfolio
      (Phase 3).
  - name: Teams
    description: Team management — create teams, manage members, and handle access requests (Phase 6)
  - name: Issues
    description: Persistent backlog issue CRUD and action endpoints (Phase 6)
  - name: Backlog
    description: AI-powered backlog ranking, effort-type suggestions, and semantic search (Phase 6)
paths:
  "/weeks/{weekStart}/plans":
    post:
      operationId: createPlan
      summary: Create a weekly plan
      description: |
        Create a plan for the specified week. Idempotent: returns 201 on create,
        200 if the plan already exists for this user/week.
      tags:
        - Plans
      parameters:
        - $ref: "#/components/parameters/WeekStartPath"
      responses:
        "200":
          description: Plan already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"
        "201":
          description: Plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  "/weeks/{weekStart}/plans/me":
    get:
      operationId: getMyPlan
      summary: Get my plan for a given week
      tags:
        - Plans
      parameters:
        - $ref: "#/components/parameters/WeekStartPath"
      responses:
        "200":
          description: Plan found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  "/plans/{planId}":
    get:
      operationId: getPlan
      summary: Get plan by ID
      description: Accessible by the plan owner or their manager.
      tags:
        - Plans
      parameters:
        - $ref: "#/components/parameters/PlanIdPath"
      responses:
        "200":
          description: Plan found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  "/weeks/{weekStart}/plans/{userId}":
    get:
      operationId: getUserPlan
      summary: Get a user's plan (manager-only)
      tags:
        - Plans
      parameters:
        - $ref: "#/components/parameters/WeekStartPath"
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Plan found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  "/weeks/{weekStart}/plans/{userId}/commits":
    get:
      operationId: getUserPlanCommits
      summary: Get a user's commits for the selected week (manager-only)
      tags:
        - Plans
        - Commits
      parameters:
        - $ref: "#/components/parameters/WeekStartPath"
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Commit list for the user's weekly plan
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyCommit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  "/plans/{planId}/lock":
    post:
      operationId: lockPlan
      summary: Lock a weekly plan
      description: |
        Transitions a plan from DRAFT to LOCKED. Validates all commits,
        populates RCDO snapshots, and enforces chess rules.
      tags:
        - Plans
      parameters:
        - $ref: "#/components/parameters/PlanIdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200":
          description: Plan locked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  "/plans/{planId}/start-reconciliation":
    post:
      operationId: startReconciliation
      summary: Start reconciliation
      description: |
        Transitions a plan from LOCKED to RECONCILING. If the plan is in
        DRAFT and the week has passed, performs a late lock first.
      tags:
        - Plans
      parameters:
        - $ref: "#/components/parameters/PlanIdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200":
          description: Reconciliation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  "/plans/{planId}/submit-reconciliation":
    post:
      operationId: submitReconciliation
      summary: Submit reconciliation
      description: |
        Transitions from RECONCILING to RECONCILED. Requires all commits
        to have completionStatus and deltaReason for non-DONE items.
      tags:
        - Plans
      parameters:
        - $ref: "#/components/parameters/PlanIdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200":
          description: Reconciliation submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  "/plans/{planId}/carry-forward":
    post:
      operationId: carryForward
      summary: Carry forward incomplete commits
      description: |
        Copies selected commits into the next week's plan (DRAFT).
        Transitions the current plan to CARRY_FORWARD.
      tags:
        - Plans
      parameters:
        - $ref: "#/components/parameters/PlanIdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CarryForwardRequest"
      responses:
        "200":
          description: Carry-forward executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  "/plans/{planId}/commits":
    get:
      operationId: listCommits
      summary: List commits for a plan
      tags:
        - Commits
      parameters:
        - $ref: "#/components/parameters/PlanIdPath"
      responses:
        "200":
          description: Commits returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyCommit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createCommit
      summary: Create a new commit
      tags:
        - Commits
      parameters:
        - $ref: "#/components/parameters/PlanIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommitRequest"
      responses:
        "201":
          description: Commit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyCommit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  "/commits/{commitId}":
    patch:
      operationId: updateCommit
      summary: Partially update a commit
      tags:
        - Commits
      parameters:
        - $ref: "#/components/parameters/CommitIdPath"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommitRequest"
      responses:
        "200":
          description: Commit updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyCommit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteCommit
      summary: Delete a commit (DRAFT only)
      tags:
        - Commits
      parameters:
        - $ref: "#/components/parameters/CommitIdPath"
      responses:
        "204":
          description: Commit deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  "/commits/{commitId}/actual":
    patch:
      operationId: updateActual
      summary: Update reconciliation data for a commit
      tags:
        - Commits
      parameters:
        - $ref: "#/components/parameters/CommitIdPath"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActualRequest"
      responses:
        "200":
          description: Actual updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyCommitActual"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  "/commits/{commitId}/check-in":
    post:
      operationId: addCheckIn
      summary: Append a daily check-in to a commit
      description: |
        Appends a structured progress micro-update to the given commit.
        Check-in history is append-only — entries are never modified or deleted.
      tags:
        - Commits
      parameters:
        - $ref: "#/components/parameters/CommitIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInRequest"
      responses:
        "201":
          description: Check-in entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  "/commits/{commitId}/check-ins":
    get:
      operationId: getCheckIns
      summary: Get check-in history for a commit
      description: |
        Returns the complete append-only check-in history for the given commit,
        ordered oldest-first.
      tags:
        - Commits
      parameters:
        - $ref: "#/components/parameters/CommitIdPath"
      responses:
        "200":
          description: Check-in history returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  "/weeks/{weekStart}/team/summary":
    get:
      operationId: getTeamSummary
      summary: Manager team dashboard
      description: |
        Returns a paginated, filtered summary of direct reports' plans
        for the given week.
      tags:
        - Manager
      parameters:
        - $ref: "#/components/parameters/WeekStartPath"
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: state
          in: query
          schema:
            $ref: "#/components/schemas/PlanState"
        - name: outcomeId
          in: query
          schema:
            type: string
            format: uuid
        - name: incomplete
          in: query
          schema:
            type: boolean
        - name: nonStrategic
          in: query
          schema:
            type: boolean
        - name: priority
          in: query
          schema:
            $ref: "#/components/schemas/ChessPriority"
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/CommitCategory"
      responses:
        "200":
          description: Team summary returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamSummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  "/weeks/{weekStart}/team/rcdo-rollup":
    get:
      operationId: getRcdoRollup
      summary: RCDO roll-up for manager dashboard
      description: |
        Returns commits grouped by RCDO outcome across direct reports,
        with chess priority distribution and non-strategic counts.
      tags:
        - Manager
      parameters:
        - $ref: "#/components/parameters/WeekStartPath"
      responses:
        "200":
          description: RCDO roll-up returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RcdoRollupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /notifications/unread:
    get:
      operationId: getUnreadNotifications
      summary: Get unread in-app notifications
      description: |
        Returns unread notifications for the current user, newest first.
        MVP renders in-app banners on page load.
      tags:
        - Notifications
      responses:
        "200":
          description: Unread notifications returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/notifications/{notificationId}/read":
    post:
      operationId: markNotificationRead
      summary: Mark a notification as read
      tags:
        - Notifications
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Notification marked as read
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      summary: Mark all notifications as read
      tags:
        - Notifications
      responses:
        "204":
          description: All notifications marked as read
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/plans/{planId}/review":
    post:
      operationId: createReview
      summary: Submit manager review
      description: |
        Manager approves or requests changes to a plan. Request changes
        is blocked if carry-forward has already been executed.
      tags:
        - Manager
      parameters:
        - $ref: "#/components/parameters/PlanIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "200":
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagerReview"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /rcdo/tree:
    get:
      operationId: getRcdoTree
      summary: Get RCDO hierarchy
      tags:
        - RCDO
      responses:
        "200":
          description: RCDO tree returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RcdoTreeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /rcdo/search:
    get:
      operationId: searchRcdo
      summary: Typeahead search for RCDO outcomes
      tags:
        - RCDO
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RcdoSearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /ai/suggest-rcdo:
    post:
      operationId: suggestRcdo
      summary: AI-assisted RCDO suggestion
      description: |
        Given a commit title and description, returns ranked RCDO suggestions.
        Returns 200 with empty suggestions on LLM unavailability.
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestRcdoRequest"
      responses:
        "200":
          description: Suggestions returned (may be empty if AI unavailable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestRcdoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Rate limit exceeded
  /ai/draft-reconciliation:
    post:
      operationId: draftReconciliation
      summary: AI-drafted reconciliation (beta)
      description: |
        Returns AI-suggested completion statuses and delta summaries
        for all commits in a plan.
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftReconciliationRequest"
      responses:
        "200":
          description: Reconciliation draft returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftReconciliationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Rate limit exceeded
  /ai/manager-insights:
    post:
      operationId: managerInsights
      summary: AI manager dashboard insights (beta)
      description: |
        Returns AI-generated manager insight summaries for a dashboard week.
        Returns 200 with empty insights when AI is unavailable.
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManagerInsightsRequest"
      responses:
        "200":
          description: Manager insights returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagerInsightsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Rate limit exceeded
  /ai/plan-quality-check:
    post:
      operationId: planQualityCheck
      summary: Lock-time AI plan quality nudge (Wave 1)
      description: |
        Runs data-driven quality checks on the given plan and returns a list of
        nudge items covering: RCDO coverage gaps, category imbalance, chess
        distribution balance, and RCDO alignment vs team average.
        No LLM is required — all checks are computed from existing plan data.
        Returns 200 with status "unavailable" and empty nudges when the
        planQualityNudge feature flag is disabled.
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanQualityCheckRequest"
      responses:
        "200":
          description: Quality nudges returned (may be empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanQualityCheckResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Rate limit exceeded
  /ai/suggest-next-work:
    post:
      operationId: suggestNextWork
      summary: AI next-work suggestions — Phase 1 (Wave 2)
      description: >
        Returns data-driven next-work suggestions for the authenticated user.

        Phase 1 is pure data queries — no LLM required.


        Suggestion sources:

        - CARRY_FORWARD — commits not completed in the user's last 2 weeks

        - COVERAGE_GAP — RCDO outcomes with zero team commits in the last 2–4 weeks
          that had prior team activity

        Results are filtered by recent DECLINE feedback (within 4 weeks) to avoid

        re-surfacing dismissed items.


        Returns 200 with status "unavailable" and empty suggestions when the

        suggestNextWork feature flag is disabled.
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestNextWorkRequest"
      responses:
        "200":
          description: Suggestions returned (may be empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestNextWorkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Rate limit exceeded
  /ai/suggestion-feedback:
    post:
      operationId: recordSuggestionFeedback
      summary: Record user feedback on a next-work suggestion
      description: >
        Records a user action (ACCEPT, DEFER, DECLINE) on an AI-generated

        next-work suggestion.


        Upsert semantics: submitting feedback for a suggestion the user has already

        acted on updates the previous record.


        DECLINE actions suppress the suggestion from re-surfacing for 4 weeks.

        Returns 200 with status "unavailable" when the suggestNextWork flag is disabled.
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestionFeedbackRequest"
      responses:
        "200":
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestionFeedbackResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /plans/draft-from-history:
    post:
      operationId: draftFromHistory
      summary: '"Start My Week" — create a draft plan pre-filled from history'
      description: >
        Creates (or updates) a DRAFT plan for the requested week, pre-filled
        with

        AI-suggested commits derived from the user's last 4 weeks of planning history.


        Suggestion sources:

        - CARRIED_FORWARD — commits not completed (status != DONE) in the most recent
          reconciled plan
        - RECURRING — commit titles or outcome IDs appearing in 2+ consecutive historical weeks

        - COVERAGE_GAP — reserved for future NextWorkService integration


        Each suggested commit is persisted in the new/existing DRAFT plan with its source

        stored in the tags[] array as "draft_source:<SOURCE>".


        Returns 409 if the target week already has a plan in a non-DRAFT state.
      tags:
        - Plans
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftFromHistoryRequest"
      responses:
        "200":
          description: Draft plan created or updated with suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftFromHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /users/me/trends:
    get:
      operationId: getMyTrends
      summary: Get cross-week trend analytics for the authenticated user
      description: >
        Returns rolling-window planning metrics for the last N weeks:

        strategic alignment rate, carry-forward velocity, completion accuracy,

        priority/category distributions, per-week breakdown, and structured insights.
      tags:
        - Trends
      parameters:
        - name: weeks
          in: query
          required: false
          description: Size of the rolling window in weeks (1–26, default 8)
          schema:
            type: integer
            minimum: 1
            maximum: 26
            default: 8
      responses:
        "200":
          description: Trend data returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /admin/org-policy:
    get:
      operationId: getOrgPolicy
      summary: Get org policy configuration (admin only)
      description: |
        Returns the current org policy including chess rules, cadence schedule,
        and weekly digest configuration. Requires the ADMIN role.
      tags:
        - Admin
      responses:
        "200":
          description: Org policy returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgPolicy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/org-policy/digest:
    patch:
      operationId: updateDigestConfig
      summary: Update the weekly digest schedule (admin only)
      description: >
        Updates the digest_day and digest_time fields of the org's policy
        record.

        Evicts the policy cache so the next digest job run picks up the change.

        Requires the ADMIN role.
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDigestConfigRequest"
      responses:
        "200":
          description: Digest configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgPolicy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /admin/adoption-metrics:
    get:
      operationId: getAdoptionMetrics
      summary: Get weekly adoption funnel metrics (admin only)
      description: |
        Returns per-week breakdowns of the planning lifecycle funnel:
        plans created, locked, reconciled, and reviewed, plus total active
        users and cadence-compliance rate over a rolling window.
        Requires the ADMIN role.
      tags:
        - Admin
      parameters:
        - name: weeks
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 26
            default: 8
          description: Rolling-window size in weeks (1–26)
      responses:
        "200":
          description: Adoption metrics returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdoptionMetrics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /admin/ai-usage:
    get:
      operationId: getAiUsage
      summary: Get AI feature usage metrics (admin only)
      description: |
        Returns suggestion acceptance/defer/decline rates from
        ai_suggestion_feedback and in-process cache hit/miss statistics.
        Requires the ADMIN role.
      tags:
        - Admin
      parameters:
        - name: weeks
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 26
            default: 8
          description: Rolling-window size in weeks (1–26)
      responses:
        "200":
          description: AI usage metrics returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiUsageMetrics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /admin/rcdo-health:
    get:
      operationId: getRcdoHealth
      summary: Get RCDO health report (admin only)
      description: |
        Examines locked commits from the last 8 weeks and produces a ranked
        list of RCDO outcomes by commit coverage. Outcomes with zero commits
        are listed as stale/uncovered. Requires the ADMIN role.
      tags:
        - Admin
      responses:
        "200":
          description: RCDO health report returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RcdoHealthReport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /integrations/link-ticket:
    post:
      operationId: linkTicket
      summary: Link a commit to an external ticket
      description: >
        Links a weekly commit to a ticket in an external issue-tracker (Jira or
        Linear).

        When the commit's title or description is empty, the values are auto-populated

        from the fetched ticket data.


        Idempotent: if the link already exists, returns the existing record with 201.
      tags:
        - Integrations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkTicketRequest"
      responses:
        "201":
          description: Ticket linked (or already linked — idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalTicketLink"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  "/commits/{commitId}/linked-tickets":
    get:
      operationId: getLinkedTickets
      summary: Get external ticket links for a commit
      description: Returns all external ticket links associated with the given weekly
        commit.
      tags:
        - Integrations
        - Commits
      parameters:
        - name: commitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The weekly commit UUID
      responses:
        "200":
          description: List of linked tickets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkedTicketsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  "/integrations/webhook/{provider}":
    post:
      operationId: handleIntegrationWebhook
      summary: Handle an external ticket status webhook
      description: >
        Receives a provider webhook payload and fan-outs any mapped ticket
        status

        change to linked internal check-in entries. This endpoint is unauthenticated

        because external providers cannot present a user session; provider-specific

        signature verification is handled separately.
      security: []
      tags:
        - Integrations
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          description: External issue-tracker provider (case-insensitive; e.g. jira or
            linear)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Provider-specific webhook payload
      responses:
        "200":
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
  /users/me/capacity:
    get:
      operationId: getMyCapacity
      summary: Get my capacity profile
      description: >
        Returns the authenticated user's most recently computed capacity
        profile.

        Returns 404 when no profile has been computed yet (the profile is

        generated by the weekly CapacityComputeJob).
      tags:
        - Capacity
      responses:
        "200":
          description: Capacity profile returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapacityProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /team/capacity:
    get:
      operationId: getTeamCapacity
      summary: Get team capacity for a week (manager only)
      description: |
        Returns the capacity posture of every direct report of the authenticated
        manager for the requested week. Requires the MANAGER role.
      tags:
        - Capacity
      parameters:
        - name: weekStart
          in: query
          required: true
          description: ISO-8601 Monday date (e.g. 2026-03-16)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Team capacity returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamCapacityResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /users/me/estimation-coaching:
    get:
      operationId: getEstimationCoaching
      summary: Get estimation coaching feedback for a plan
      description: |
        Returns post-reconciliation estimation coaching insights for the
        authenticated user's specified plan. Gated by the estimationCoaching
        feature flag on the backend.
      tags:
        - Capacity
      parameters:
        - name: planId
          in: query
          required: true
          description: UUID of the weekly plan to generate coaching for
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Estimation coaching returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimationCoachingResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /health:
    get:
      operationId: healthCheck
      summary: Service health check
      security: []
      tags:
        - Plans
      responses:
        "200":
          description: Service is healthy
  "/plans/{planId}/quick-update":
    post:
      operationId: quickUpdate
      summary: Batch check-in for multiple commits
      description: |
        Submits a rapid-fire batch of progress check-ins for multiple commits
        within a single plan. Each item in the `updates` array creates a new
        immutable ProgressEntry for the target commit.

        Behaviour:
        - The plan must belong to the authenticated user.
        - The plan must be in LOCKED or RECONCILING state.
        - Each referenced commitId must belong to the target plan.
        - An empty `updates` array is accepted and returns `updatedCount: 0`.
      tags:
        - QuickUpdate
      security:
        - BearerAuth: []
      parameters:
        - name: planId
          in: path
          required: true
          description: UUID of the weekly plan to check in against
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuickUpdateRequest"
      responses:
        "200":
          description: Batch check-in recorded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickUpdateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /ai/check-in-options:
    post:
      operationId: getCheckInOptions
      summary: Generate AI check-in note options
      description: >
        Generates context-aware check-in note suggestions for a single commit.


        The response contains:

        - `statusOptions` — valid ProgressStatus values for the status picker.

        - `progressOptions` — short text suggestions derived from AI analysis of
          the commit context plus pattern-matched options from the user's past
          check-in notes.

        This endpoint always returns HTTP 200 on application-level fallback.

        When the LLM is unavailable, the commit is not found, or response parsing

        fails, the service returns `status: "ok"`, the standard status options,

        and an empty `progressOptions` list.
      tags:
        - AI
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInOptionRequest"
      responses:
        "200":
          description: Check-in options returned (may be empty on fallback)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInOptionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /users/me/profile:
    get:
      operationId: getUserProfile
      summary: Get the authenticated user's behavioural profile
      description: |
        Returns the computed user model snapshot for the authenticated user.

        If a snapshot exists, the response contains the latest computed
        performance metrics, preferences, and trend signals. If no snapshot has
        been computed yet, the endpoint still returns HTTP 200 with:
        - `userId` set to the authenticated user
        - `weeksAnalyzed` set to 0
        - `performanceProfile`, `preferences`, and `trends` set to null
      tags:
        - UserProfile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /analytics/outcome-coverage:
    get:
      operationId: getOutcomeCoverage
      summary: Get outcome coverage timeline
      description: |
        Returns per-week commit activity for a specific RCDO outcome over the
        last `weeks` weeks.

        Each week shows:
        - `commitCount`       — total strategic commits linked to the outcome
        - `contributorCount`  — distinct contributors who made those commits
        - `highPriorityCount` — commits with chess priority KING or QUEEN

        A `trendDirection` compares the two most recent weeks: `RISING` when
        the latest week has more commits than the prior week, `FALLING` when
        it has fewer, or `STABLE` when equal.

        Requires MANAGER role.
        Gated by the `strategicIntelligence` feature flag.
      tags:
        - Analytics
      security:
        - BearerAuth: []
      parameters:
        - name: outcomeId
          in: query
          required: true
          description: UUID of the RCDO outcome to analyse
          schema:
            type: string
            format: uuid
        - name: weeks
          in: query
          required: false
          description: Rolling-window size in weeks (1–26, default 8)
          schema:
            type: integer
            minimum: 1
            maximum: 26
            default: 8
      responses:
        "200":
          description: Outcome coverage timeline returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutcomeCoverageTimeline"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /analytics/carry-forward-heatmap:
    get:
      operationId: getCarryForwardHeatmap
      summary: Get team carry-forward heatmap
      description: |
        Returns a carry-forward heatmap for the authenticated manager's direct
        reports over the last `weeks` weeks.

        Each user row contains an ordered list of per-week cells (oldest first).
        Weeks with no data for a user produce a cell with `carriedCount: 0`.

        High carry-forward counts may indicate scope creep, estimation problems,
        or capacity constraints.

        Requires MANAGER role.
        Gated by the `strategicIntelligence` feature flag.
      tags:
        - Analytics
      security:
        - BearerAuth: []
      parameters:
        - name: weeks
          in: query
          required: false
          description: Rolling-window size in weeks (1–26, default 8)
          schema:
            type: integer
            minimum: 1
            maximum: 26
            default: 8
      responses:
        "200":
          description: Carry-forward heatmap returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarryForwardHeatmap"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /analytics/category-shifts:
    get:
      operationId: getCategoryShifts
      summary: Get commit category shift analysis
      description: |
        Returns per-user commit category distribution shifts between the prior
        and recent halves of the analysis window for the authenticated manager's
        direct reports.

        Each user entry includes:
        - `currentDistribution` — category → proportion for the recent half
        - `priorDistribution`   — category → proportion for the prior half
        - `biggestShift`        — the category with the largest absolute change
          in proportion (positive delta = increased, negative = decreased)

        Requires MANAGER role.
        Gated by the `strategicIntelligence` feature flag.
      tags:
        - Analytics
      security:
        - BearerAuth: []
      parameters:
        - name: weeks
          in: query
          required: false
          description: Rolling-window size in weeks (1–26, default 8)
          schema:
            type: integer
            minimum: 1
            maximum: 26
            default: 8
      responses:
        "200":
          description: Category shift analysis returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserCategoryShift"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /analytics/estimation-accuracy:
    get:
      operationId: getEstimationAccuracy
      summary: Get team estimation accuracy distribution
      description: |
        Returns per-user confidence-vs-actual-completion-rate accuracy metrics
        for the authenticated manager's direct reports over the last `weeks`
        weeks.

        A positive `calibrationGap` indicates systematic over-confidence:
        the user's stated confidence exceeds their actual completion rate.

        Requires MANAGER role.
        Gated by the `strategicIntelligence` feature flag.
      tags:
        - Analytics
      security:
        - BearerAuth: []
      parameters:
        - name: weeks
          in: query
          required: false
          description: Rolling-window size in weeks (1–26, default 8)
          schema:
            type: integer
            minimum: 1
            maximum: 26
            default: 8
      responses:
        "200":
          description: Estimation accuracy distribution returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserEstimationAccuracy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  "/analytics/predictions/{userId}":
    get:
      operationId: getUserPredictions
      summary: Get rule-based predictions for a user
      description: >
        Returns all likely (actionable) predictions for the given user.

        Only predictions where `likely: true` are included.


        Three prediction types are evaluated:


        | type               | description                                                                 |

        |--------------------|-----------------------------------------------------------------------------|

        | `CARRY_FORWARD`    | User has a pattern of carrying ≥ 3 items forward in ≥ 2 of the last 3 weeks AND current week already has ≥ 5 commits |

        | `LATE_LOCK`        | User late-locked in ≥ 3 of the last 4 weeks AND current plan is still DRAFT on lock day |

        | `COVERAGE_DECLINE` | Strategic outcome coverage declined for 3 or more consecutive weeks AND no new commits this week |


        **Access control:** the caller must have the MANAGER role **or** be

        requesting predictions for themselves (self-service, `userId` must equal

        the authenticated user's ID).


        Gated by the `predictions` feature flag.
      tags:
        - Analytics
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: UUID of the user to generate predictions for
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: |
            Predictions returned. An empty array is returned when no prediction
            rules fire for the given user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prediction"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /outcomes/metadata:
    get:
      operationId: listOutcomeMetadata
      summary: List all outcome metadata for the organisation
      description: |
        Returns all outcome metadata rows for the authenticated user's
        organisation.

        Each record includes the target date, progress configuration, and
        computed urgency band (null when urgency has not been computed yet).

        Available to any authenticated user.
        Gated by the `outcomeUrgency` feature flag.
      tags:
        - Outcome Metadata
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of outcome metadata records returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OutcomeMetadataResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/outcomes/{outcomeId}/metadata":
    get:
      operationId: getOutcomeMetadata
      summary: Get metadata for a single outcome
      description: |
        Returns the outcome metadata record for the specified outcome in the
        authenticated user's organisation. Returns 404 when no metadata row
        exists for the given outcome.

        Available to any authenticated user.
        Gated by the `outcomeUrgency` feature flag.
      tags:
        - Outcome Metadata
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OutcomeIdPath"
      responses:
        "200":
          description: Outcome metadata returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutcomeMetadataResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: upsertOutcomeMetadata
      summary: Create or update outcome metadata
      description: |
        Creates or updates (upserts) the metadata for the given outcome. All
        fields are optional — omitted fields leave the existing persisted value
        unchanged on update.

        Setting `targetDate` to null removes target-date tracking and causes
        the urgency band to be set to `NO_TARGET` on the next recomputation.

        After persisting, urgency recomputation is triggered immediately for
        the updated outcome.

        Requires ADMIN or MANAGER role.
        Gated by the `outcomeUrgency` feature flag.
      tags:
        - Outcome Metadata
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OutcomeIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutcomeMetadataRequest"
      responses:
        "200":
          description: Outcome metadata created or updated; urgency recomputed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutcomeMetadataResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  "/outcomes/{outcomeId}/progress":
    patch:
      operationId: updateOutcomeProgress
      summary: Update progress fields of an existing outcome metadata record
      description: |
        Lightweight update that modifies only the `currentValue` and/or
        `milestones` fields of an existing outcome metadata record. Both
        fields are optional — supply only the ones that need updating.

        Returns 404 when no metadata row exists for the given outcome
        (use PUT /outcomes/{outcomeId}/metadata to create one first).

        After persisting the update, urgency recomputation is triggered
        immediately so that urgency bands reflect the new progress values.

        Requires ADMIN or MANAGER role.
        Gated by the `outcomeUrgency` feature flag.
      tags:
        - Outcome Metadata
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OutcomeIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressUpdateRequest"
      responses:
        "200":
          description: Progress updated; urgency recomputed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutcomeMetadataResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /outcomes/urgency-summary:
    get:
      operationId: getUrgencySummary
      summary: Get urgency summary for all tracked outcomes
      description: |
        Returns all RCDO outcomes with their computed urgency bands for the
        authenticated user's organisation.

        Only outcomes that have a metadata row with a configured `targetDate`
        appear in this list. Outcomes with no metadata row or no target date
        are omitted.

        Available to any authenticated user.
        Gated by the `outcomeUrgency` feature flag.
      tags:
        - Urgency
      security:
