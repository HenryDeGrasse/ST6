    PlanState:
      type: string
      enum:
        - DRAFT
        - LOCKED
        - RECONCILING
        - RECONCILED
        - CARRY_FORWARD
    ReviewStatus:
      type: string
      enum:
        - REVIEW_NOT_APPLICABLE
        - REVIEW_PENDING
        - CHANGES_REQUESTED
        - APPROVED
    ChessPriority:
      type: string
      enum:
        - KING
        - QUEEN
        - ROOK
        - BISHOP
        - KNIGHT
        - PAWN
    CompletionStatus:
      type: string
      enum:
        - DONE
        - PARTIALLY
        - NOT_DONE
        - DROPPED
    LockType:
      type: string
      enum:
        - ON_TIME
        - LATE_LOCK
    CommitCategory:
      type: string
      enum:
        - DELIVERY
        - OPERATIONS
        - CUSTOMER
        - GTM
        - PEOPLE
        - LEARNING
        - TECH_DEBT
    WeeklyPlan:
