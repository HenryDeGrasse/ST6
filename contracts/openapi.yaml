        outcomeId:
          type: string
          format: uuid
          nullable: true
        nonStrategicReason:
          type: string
          nullable: true
        expectedResult:
          type: string
        confidence:
          type: number
          nullable: true
        tags:
          type: array
          items:
            type: string
        progressNotes:
          type: string
        estimatedHours:
          type: number
          minimum: 0
          maximum: 100
          nullable: true
        snapshotRallyCryId:
          type: string
          format: uuid
          nullable: true
        snapshotRallyCryName:
          type: string
          nullable: true
        snapshotObjectiveId:
          type: string
          format: uuid
          nullable: true
        snapshotObjectiveName:
          type: string
          nullable: true
        snapshotOutcomeId:
          type: string
          format: uuid
          nullable: true
        snapshotOutcomeName:
          type: string
          nullable: true
        carriedFromCommitId:
          type: string
          format: uuid
          nullable: true
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        validationErrors:
          type: array
          items:
