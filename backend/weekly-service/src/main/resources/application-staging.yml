# ---------------------------------------------------------------------------
# Staging environment profile
# Mirrors production behavior at reduced scale.
# Secrets/connections: injected by ECS task definition + Secrets Manager.
# This file only overrides BEHAVIOR.
# ---------------------------------------------------------------------------

ai:
  features:
    suggest-rcdo-enabled: true
    draft-reconciliation-enabled: true
    manager-insights-enabled: true

weekly:
  rag:
    # Uses PINECONE_API_KEY + OPENAI_API_KEY injected by ECS task definition
    provider: pinecone

logging:
  level:
    com.weekly: INFO
