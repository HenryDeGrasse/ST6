# ---------------------------------------------------------------------------
# Weekly Commitments — Base configuration (shared across all profiles)
#
# Secrets and connection strings come from env vars (never hardcoded).
# Behavior defaults (log levels, feature flags, AI models) are set per
# profile in application-{local,dev,staging,prod}.yml.
# ---------------------------------------------------------------------------
spring:
  application:
    name: weekly-service
  profiles:
    active: ${APP_ENV:local}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:weekly}
    username: ${POSTGRES_USER:weekly}
    password: ${POSTGRES_PASSWORD:weekly}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: weekly-service
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms,250ms,500ms,1000ms,5000ms

# AI defaults (profiles override provider + flags)
ai:
  provider: ${AI_PROVIDER:stub}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:anthropic/claude-sonnet-4}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
  features:
    suggest-rcdo-enabled: true
    draft-reconciliation-enabled: true
    manager-insights-enabled: true
    plan-quality-nudge-enabled: true
    suggest-next-work-enabled: true
    llm-next-work-ranking-enabled: true
    target-date-forecasting-enabled: true
    planning-copilot-enabled: true
    executive-dashboard-enabled: true
    weekly-planning-agent-enabled: true
    misalignment-agent-enabled: true

analytics:
  refresh:
    enabled: false

notification:
  materializer:
    enabled: false
  digest:
    enabled: false

integration:
  ticket-sync:
    enabled: false
    interval-ms: 900000
    initial-delay-ms: 60000

tenant:
  rls:
    enabled: true

capacity:
  compute:
    enabled: false

weekly:
  audit:
    hash-verification:
      enabled: false
    state-reconciliation:
      enabled: false
    archival:
      enabled: false
      archive-after-years: 5
  plan:
    retention:
      enabled: false
      soft-delete-years: 3
      hard-delete-grace-days: 90
  rag:
    # memory (default) = in-process stub; pinecone = production vector store
    provider: ${RAG_PROVIDER:memory}
    pinecone:
      api-key: ${PINECONE_API_KEY:}
      # Existing index "spice-fortran" (1536 dims, cosine, aws/us-east-1)
      index-name: ${PINECONE_INDEX_NAME:spice-fortran}
    openai:
      api-key: ${OPENAI_API_KEY:}

---
spring:
  config:
    activate:
      on-profile: worker

analytics:
  refresh:
    enabled: true

notification:
  materializer:
    enabled: true
  cadence:
    enabled: true
  digest:
    enabled: true

integration:
  ticket-sync:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

ai:
  provider: stub

notification:
  materializer:
    enabled: false

tenant:
  rls:
    enabled: false

weekly:
  rag:
    provider: memory
